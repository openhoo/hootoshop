name: CI and Release

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  HOOVERSION_VERSION: 0.1.1

jobs:
  commitlint:
    name: Lint commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint commits
        uses: openhoo/hooversion/actions/lint@v0.1.1
        with:
          version: ${{ env.HOOVERSION_VERSION }}
          bun-version: 1.3.14

  build:
    name: Test and build
    runs-on: ubuntu-latest
    needs: commitlint

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint, format, tests, and build
        run: bun run check

      - name: Audit dependencies
        run: bun run audit

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Release
        uses: openhoo/hooversion/actions/release@v0.1.1
        with:
          version: ${{ env.HOOVERSION_VERSION }}
          bun-version: 1.3.14
          github-token: ${{ secrets.GITHUB_TOKEN }}
          install-command: bun install --frozen-lockfile
